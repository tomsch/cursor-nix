name: Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'  # Hourly
  workflow_dispatch:      # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for updates
        id: check
        run: |
          # Resolve latest Linux x64 .deb through Cursor's updater endpoint.
          # The old cursor.com/api/download endpoint now serves the marketing HTML page.
          DOWNLOAD_ENDPOINT="https://api2.cursor.sh/updates/download/golden/linux-x64-deb/cursor/stable"
          DEB_URL=$(curl -fsSLI -o /dev/null -w '%{url_effective}' "$DOWNLOAD_ENDPOINT")

          if [[ ! "$DEB_URL" =~ /production/[a-f0-9]{40}/.*/cursor_([0-9]+([.][0-9]+)+)_amd64[.]deb$ ]]; then
            echo "Unexpected Cursor download URL: $DEB_URL" >&2
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"

          CURRENT=$(grep 'version = ' package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$VERSION" >> $GITHUB_OUTPUT
          echo "deb_url=$DEB_URL" >> $GITHUB_OUTPUT

          if [ "$VERSION" != "$CURRENT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update package
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest }}"
          DEB_URL="${{ steps.check.outputs.deb_url }}"

          # Get new hash (nix-prefetch-url outputs hash on stdout, progress on stderr)
          HASH=$(nix-prefetch-url "$DEB_URL" 2>/dev/null)
          SRI_HASH=$(nix hash convert --to sri --hash-algo sha256 "$HASH")

          # Validate hash before proceeding
          if [[ ! "$SRI_HASH" =~ ^sha256- ]]; then
            echo "ERROR: Invalid SRI hash: $SRI_HASH"
            exit 1
          fi

          echo "New hash: $SRI_HASH"

          # Update package.nix - version (use non-greedy match by stopping at quote)
          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" package.nix

          # Update package.nix - hash (use non-greedy match by stopping at quote)
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$SRI_HASH\"|" package.nix

          # Update package.nix - final download URL
          sed -i "s|url = \"[^\"]*downloads.cursor.com[^\"]*\";|url = \"$DEB_URL\";|" package.nix

          # Show diff for debugging
          git diff package.nix

      - name: Test build
        if: steps.check.outputs.needs_update == 'true'
        run: |
          nix build .#cursor --accept-flake-config --impure

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix
          git commit -m "Update cursor to ${{ steps.check.outputs.latest }}"
          git push

      - name: Create Release
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.check.outputs.latest }}" \
            --title "cursor ${{ steps.check.outputs.latest }}" \
            --notes "Updated cursor from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}"
